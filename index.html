<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي الأرقام Pro | أونلاين & ذكاء اصطناعي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-color: #0b0f1a;
            --card-bg: #161b2e;
            --primary: #c084fc;
            --secondary: #22d3ee;
            --accent: #f43f5e;
            --success: #10b981;
            --text: #f1f5f9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .game-container {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 { font-size: 1.8rem; margin-bottom: 5px; color: var(--primary); }
        .sub-title { color: #94a3b8; font-size: 0.85rem; margin-bottom: 20px; }

        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.3s ease-out; }

        .mode-selection { display: grid; gap: 15px; }
        .mode-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
        }
        .mode-btn:hover { background: rgba(192, 132, 252, 0.1); border-color: var(--primary); }

        .input-group { margin-bottom: 15px; text-align: right; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: #cbd5e1; }
        input {
            width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #334155;
            background: #0f172a; color: #fff; text-align: center; outline: none; font-size: 1.1rem;
        }

        button {
            width: 100%; padding: 12px; background: var(--primary);
            color: #fff; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        .room-info { background: #0f172a; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        .room-id-display { font-size: 2rem; color: var(--secondary); font-weight: bold; display: block; margin: 5px 0; }

        .turn-box { padding: 10px; border-radius: 10px; margin-bottom: 15px; font-weight: bold; border: 1px solid transparent; }
        .my-turn { background: rgba(16, 185, 129, 0.1); border-color: var(--success); color: var(--success); }
        .opp-turn { background: rgba(244, 63, 94, 0.1); border-color: var(--accent); color: var(--accent); }

        .stats { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 0.85rem; }
        .hearts { color: var(--accent); letter-spacing: 2px; }

        .hint-area { min-height: 60px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 15px; font-size: 0.95rem; padding: 10px; }

        .history { max-height: 80px; overflow-y: auto; font-size: 0.8rem; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 8px; text-align: right; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="game-container">
    <div id="mainTitle">
        <h1>🎯 Mind Guess Pro</h1>
        <div class="sub-title" id="statusText">اختر وضع اللعب للبدء</div>
    </div>

    <div id="modeScreen" class="screen active">
        <div class="mode-selection">
            <div class="mode-btn" onclick="startAIMode()">
                <h3>🤖 ضد الذكاء الاصطناعي</h3>
                <p style="font-size: 0.8rem; color: #94a3b8;">تحدَّ الكمبيوتر في نمط المحترفين</p>
            </div>
            <div class="mode-btn" onclick="showLobby()">
                <h3>🌐 أونلاين (5 أرقام)</h3>
                <p style="font-size: 0.8rem; color: #94a3b8;">العب ضد صديقك عن بعد</p>
            </div>
        </div>
    </div>

    <div id="lobbyScreen" class="screen">
        <div class="room-info">
            <label>رمز غرفتك:</label>
            <span id="myRoomId" class="room-id-display">-----</span>
            <button onclick="copyId()" style="background: #334155; font-size: 0.7rem; width: auto; padding: 5px 10px;">نسخ 📋</button>
        </div>
        <div class="input-group">
            <label>انضم لغرفة صديقك (5 أرقام):</label>
            <input type="number" id="joinIdInput" placeholder="أدخل الرمز هنا...">
        </div>
        <button onclick="joinGame()">انضم الآن ⚔️</button>
        <button onclick="backToMain()" style="margin-top: 10px; background: transparent; color: #94a3b8;">رجوع</button>
    </div>

    <div id="setupScreen" class="screen">
        <div class="input-group">
            <label id="setupLabel">أدخل رقمك السري (1-100):</label>
            <input type="password" id="secretInput" placeholder="لن يراه الخصم">
        </div>
        <button onclick="confirmSecret()">جاهز! 🔥</button>
    </div>

    <div id="playScreen" class="screen">
        <div id="turnDisplay" class="turn-box my-turn">دورك للتخمين</div>
        <div class="stats">
            <div>أنت: <span id="myLives" class="hearts">❤️❤️❤️❤️❤️</span></div>
            <div>الخصم: <span id="oppLives" class="hearts">❤️❤️❤️❤️❤️</span></div>
        </div>
        <div class="hint-area" id="hintBox">ابدأ التخمين!</div>
        <div id="actionArea">
            <input type="number" id="guessInput" placeholder="رقم من 1-100" style="margin-bottom: 10px;">
            <button onclick="makeGuess()">إرسال التخمين 🚀</button>
        </div>
        <div class="history" id="gameHistory"></div>
    </div>

    <div id="endScreen" class="screen">
        <h2 id="endStatus" style="margin-bottom: 10px;">🎉 فزت!</h2>
        <p id="secretReveal" style="margin-bottom: 20px; font-size: 0.9rem;"></p>
        <button onclick="location.reload()">لعب مرة أخرى 🔄</button>
    </div>
</div>

<script>
    let peer, conn;
    let gameMode = ''; // 'AI' or 'ONLINE'
    let mySecret, oppSecret;
    let myLives = 5, oppLives = 5;
    let isMyTurn = false;
    let aiMin = 1, aiMax = 100;

    // --- إدارة الشاشات ---
    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function backToMain() { switchScreen('modeScreen'); }

    // --- وضع الذكاء الاصطناعي (AI Mode) ---
    function startAIMode() {
        gameMode = 'AI';
        oppSecret = Math.floor(Math.random() * 100) + 1;
        switchScreen('setupScreen');
        document.getElementById('statusText').innerText = 'تلعب ضد AI محترف';
    }

    // --- وضع الأونلاين (Online Mode) ---
    function showLobby() {
        gameMode = 'ONLINE';
        const shortId = Math.floor(10000 + Math.random() * 90000).toString();
        peer = new Peer(shortId);
        
        peer.on('open', (id) => {
            document.getElementById('myRoomId').innerText = id;
            switchScreen('lobbyScreen');
        });

        peer.on('connection', (c) => {
            conn = c;
            isMyTurn = true; // المستضيف يبدأ
            setupOnlineEvents();
        });

        peer.on('error', (err) => {
            if(err.type === 'unavailable-id') {
                showLobby(); // إعادة المحاولة لو الرقم محجوز
            } else {
                alert('خطأ في الاتصال: ' + err.type);
            }
        });
    }

    function joinGame() {
        const id = document.getElementById('joinIdInput').value;
        if(id.length !== 5) return alert('الرمز يجب أن يكون 5 أرقام');
        conn = peer.connect(id);
        isMyTurn = false;
        setupOnlineEvents();
    }

    function setupOnlineEvents() {
        conn.on('open', () => {
            switchScreen('setupScreen');
            document.getElementById('statusText').innerText = 'تم الاتصال بالخصم';
        });
        conn.on('data', (data) => handleData(data));
    }

    // --- منطق اللعبة العام ---
    function confirmSecret() {
        const val = parseInt(document.getElementById('secretInput').value);
        if(!val || val < 1 || val > 100) return alert('أدخل رقم بين 1-100');
        mySecret = val;

        if(gameMode === 'ONLINE') {
            conn.send({ type: 'READY', secret: mySecret });
            document.getElementById('setupLabel').innerText = 'بانتظار رقم الخصم...';
            if(oppSecret) startGame();
        } else {
            startGame();
        }
    }

    function startGame() {
        switchScreen('playScreen');
        updateUI();
        if(!isMyTurn && gameMode === 'AI') setTimeout(aiTurn, 1000);
    }

    function makeGuess() {
        if(!isMyTurn) return;
        const val = parseInt(document.getElementById('guessInput').value);
        if(!val) return;
        document.getElementById('guessInput').value = '';

        processGuess(val, 'me');
        
        if(gameMode === 'ONLINE') {
            conn.send({ type: 'GUESS', val: val });
        } else if(gameMode === 'AI' && oppLives > 0) {
            isMyTurn = false;
            updateUI();
            setTimeout(aiTurn, 1500);
        }
    }

    function aiTurn() {
        // خوارزمية البحث الثنائي (المحترف)
        let aiGuess = Math.floor((aiMin + aiMax) / 2);
        
        // إضافة لمسة ذكاء: أحياناً يخطئ قليلاً ليكون بشرياً لكنه يظل محترفاً
        if(Math.random() > 0.9) aiGuess += 1; 

        processGuess(aiGuess, 'opp');
        isMyTurn = true;
        updateUI();
    }

    function processGuess(val, shooter) {
        const target = (shooter === 'me') ? oppSecret : mySecret;
        const hintBox = document.getElementById('hintBox');
        let result = '';

        if(val === target) {
            endGame(shooter === 'me' ? 'WIN' : 'LOSE');
            return;
        }

        if(val > target) {
            result = `الرقم ${val} أعلى ⬆️ من المطلوب`;
            if(shooter === 'opp') aiMax = val - 1;
        } else {
            result = `الرقم ${val} أقل ⬇️ من المطلوب`;
            if(shooter === 'opp') aiMin = val + 1;
        }

        hintBox.innerText = result;
        
        if(shooter === 'me') {
            oppLives--;
            if(oppLives <= 0) endGame('LOSE_LIVES');
        } else {
            myLives--;
            if(myLives <= 0) endGame('LOSE_LIVES_ME');
        }

        if(gameMode === 'ONLINE' && shooter === 'me') isMyTurn = false;
        
        addToHistory(shooter, val, result);
        updateUI();
    }

    function handleData(data) {
        if(data.type === 'READY') {
            oppSecret = data.secret;
            if(mySecret) startGame();
        } else if(data.type === 'GUESS') {
            processGuess(data.val, 'opp');
            isMyTurn = true;
            updateUI();
        }
    }

    function updateUI() {
        document.getElementById('myLives').innerText = "❤️".repeat(myLives) || "💀";
        document.getElementById('oppLives').innerText = "❤️".repeat(oppLives) || "💀";
        const turnDisplay = document.getElementById('turnDisplay');
        
        if(isMyTurn) {
            turnDisplay.innerText = "دورك الآن 🎯";
            turnDisplay.className = "turn-box my-turn";
        } else {
            turnDisplay.innerText = "انتظر الخصم... ⏳";
            turnDisplay.className = "turn-box opp-turn";
        }
    }

    function addToHistory(who, val, res) {
        const log = document.getElementById('gameHistory');
        const entry = document.createElement('div');
        entry.innerText = (who === 'me' ? 'أنت: ' : 'الخصم: ') + val;
        log.prepend(entry);
    }

    function endGame(status) {
        switchScreen('endScreen');
        const st = document.getElementById('endStatus');
        if(status === 'WIN') st.innerText = "🏆 فزت! حزرت الرقم صح";
        else if(status === 'LOSE_LIVES') st.innerText = "🏆 فزت! الخصم خلصت محاولاته";
        else if(status === 'LOSE_LIVES_ME') st.innerText = "💀 خسرت! خلصت محاولاتك";
        else st.innerText = "💀 خسرت! الخصم حزر رقمك";
        
        document.getElementById('secretReveal').innerText = `رقمك: ${mySecret} | رقم الخصم: ${oppSecret}`;
    }

    function copyId() {
        navigator.clipboard.writeText(document.getElementById('myRoomId').innerText);
        alert('تم نسخ الرمز!');
    }
</script>
</body>
</html>
