<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي الأرقام الجماعي | Multi-Mind Guess</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #a855f7;
            --secondary: #0ea5e9;
            --accent: #f43f5e;
            --success: #10b981;
            --text: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        .game-container { background: var(--card-bg); padding: 25px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 100%; max-width: 500px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.3s; }
        
        h1 { color: var(--primary); margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: #fff; text-align: center; margin-bottom: 10px; font-size: 1rem; }
        
        button { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
        button:hover { opacity: 0.9; }
        button:disabled { background: #475569; }

        .player-tag { background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 8px; margin: 5px; display: inline-block; font-size: 0.8rem; }
        .current-turn-name { color: var(--secondary); font-weight: bold; font-size: 1.2rem; }
        
        .history { max-height: 180px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 15px; padding: 10px; text-align: right; margin-top: 15px; border: 1px solid #334155; }
        .hist-item { font-size: 0.85rem; padding: 6px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .hist-name { font-weight: bold; color: var(--primary); }

        .room-badge { background: #0f172a; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 2px dashed var(--secondary); }
        .room-code { font-size: 2rem; color: var(--secondary); font-weight: bold; display: block; letter-spacing: 5px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="game-container">
    <div id="setupPlayer">
        <h1>🎮 دخول اللعبة</h1>
        <input type="text" id="playerNameInput" placeholder="أدخل اسمك المستعار...">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button onclick="initPeer('host')">إنشاء غرفة</button>
            <button onclick="showJoinScreen()">انضمام لغرفة</button>
        </div>
        <button onclick="startAI()" style="background: #334155;">لعب ضد الذكاء الاصطناعي</button>
    </div>

    <div id="joinScreen" class="screen">
        <h2>الانضمام لصديق</h2>
        <input type="number" id="roomCodeInput" placeholder="أدخل الكود (5 أرقام)">
        <button onclick="initPeer('guest')">دخول الآن ⚔️</button>
        <button onclick="location.reload()" style="background:transparent;">رجوع</button>
    </div>

    <div id="lobbyScreen" class="screen">
        <div class="room-badge">
            <span style="font-size: 0.8rem;">كود الغرفة</span>
            <span id="displayRoomCode" class="room-code">-----</span>
        </div>
        <div id="playerList">
            <p>اللاعبون المتصلون:</p>
            <div id="connectedPlayers"></div>
        </div>
        <p id="lobbyStatus" style="margin: 15px 0; font-size: 0.8rem; color: #94a3b8;"></p>
        <button id="startGameBtn" onclick="broadcastStart()" style="display:none;">ابدأ اللعبة (للأدمن فقط) 🚀</button>
    </div>

    <div id="secretScreen" class="screen">
        <h2>اختر رقمك السري</h2>
        <p style="font-size: 0.8rem; color: #94a3b8; margin-bottom: 10px;">لن يراه أحد غيرك</p>
        <input type="password" id="mySecretInput" placeholder="رقم من 1-100">
        <button id="confirmSecretBtn" onclick="submitSecret()">جاهز 🔥</button>
    </div>

    <div id="playScreen" class="screen">
        <div style="background: rgba(14, 165, 233, 0.1); padding: 10px; border-radius: 12px; margin-bottom: 15px;">
            <span>الدور الآن عند: </span><span id="turnName" class="current-turn-name">---</span>
        </div>

        <div id="myActionArea" style="display:none;">
            <label style="font-size: 0.8rem;">اختر الخصم الذي تريد استهدافه:</label>
            <select id="targetPlayerSelect"></select>
            <input type="number" id="guessInput" placeholder="تخمينك (1-100)">
            <button onclick="sendGuess()">إرسال التخمين 🚀</button>
        </div>

        <div id="waitingText" style="color: #64748b; font-size: 0.9rem;">انتظر دورك...</div>

        <div class="history" id="gameHistory"></div>
    </div>

    <div id="endScreen" class="screen">
        <h1 id="winnerTitle">🏆 فوز!</h1>
        <p id="winDetail" style="margin-bottom: 20px;"></p>
        <button onclick="location.reload()">العودة للرئيسية 🔄</button>
    </div>
</div>

<script>
    let peer, conn, connections = [];
    let myName, myId, myRole;
    let players = []; // {id, name, secret, ready}
    let turnIndex = 0;
    let isGameStarted = false;

    function showJoinScreen() {
        document.getElementById('setupPlayer').style.display = 'none';
        switchScreen('joinScreen');
    }

    function initPeer(role) {
        myName = document.getElementById('playerNameInput').value.trim();
        if(!myName) return alert("اكتب اسمك أولاً");
        
        myRole = role;
        let id = (role === 'host') ? Math.floor(10000 + Math.random() * 90000).toString() : null;
        
        peer = new Peer(id);

        peer.on('open', (assignedId) => {
            myId = assignedId;
            if(role === 'host') {
                document.getElementById('displayRoomCode').innerText = myId;
                document.getElementById('startGameBtn').style.display = 'block';
                players.push({id: myId, name: myName, secret: null, ready: false});
                updateLobbyUI();
                switchScreen('lobbyScreen');
            } else {
                const code = document.getElementById('roomCodeInput').value;
                conn = peer.connect(code);
                setupConnection(conn);
            }
        });

        peer.on('connection', (incoming) => {
            if(players.length >= 4) return incoming.close();
            setupConnection(incoming);
        });
    }

    function setupConnection(c) {
        c.on('open', () => {
            if(myRole === 'guest') {
                c.send({type: 'JOIN', name: myName});
                switchScreen('lobbyScreen');
            }
        });

        c.on('data', (data) => {
            if(data.type === 'JOIN' && myRole === 'host') {
                players.push({id: c.peer, name: data.name, secret: null, ready: false});
                connections.push(c);
                broadcast({type: 'PLAYER_LIST', list: players});
                updateLobbyUI();
            }
            if(data.type === 'PLAYER_LIST') {
                players = data.list;
                updateLobbyUI();
            }
            if(data.type === 'START_GAME') {
                switchScreen('secretScreen');
            }
            if(data.type === 'SECRET_READY') {
                let p = players.find(x => x.id === data.from);
                p.secret = data.secret;
                p.ready = true;
                if(myRole === 'host') checkAllReady();
            }
            if(data.type === 'GUESS_EVENT') {
                handleGuessEvent(data);
            }
            if(data.type === 'WINNER') {
                showWinner(data);
            }
        });
    }

    function broadcast(data) {
        connections.forEach(c => c.send(data));
    }

    function updateLobbyUI() {
        const container = document.getElementById('connectedPlayers');
        container.innerHTML = players.map(p => `<span class="player-tag">👤 ${p.name}</span>`).join('');
        document.getElementById('lobbyStatus').innerText = `عدد اللاعبين: ${players.length} / 4`;
    }

    function broadcastStart() {
        if(players.length < 2) return alert("تحتاج لاعب واحد على الأقل للمنافسة");
        broadcast({type: 'START_GAME'});
        switchScreen('secretScreen');
    }

    function submitSecret() {
        const secret = parseInt(document.getElementById('mySecretInput').value);
        if(!secret || secret < 1 || secret > 100) return alert("رقم بين 1-100");
        
        document.getElementById('confirmSecretBtn').disabled = true;
        document.getElementById('confirmSecretBtn').innerText = "بانتظار البقية...";

        if(myRole === 'host') {
            let p = players.find(x => x.id === myId);
            p.secret = secret; p.ready = true;
            checkAllReady();
        } else {
            conn.send({type: 'SECRET_READY', from: myId, secret: secret});
        }
    }

    function checkAllReady() {
        if(players.every(p => p.ready)) {
            const firstTurnId = players[0].id;
            broadcast({type: 'GUESS_EVENT', nextTurn: turnIndex, players: players});
            handleGuessEvent({nextTurn: 0});
        }
    }

    function handleGuessEvent(data) {
        if(data.players) players = data.players;
        turnIndex = data.nextTurn;
        const currentPlayer = players[turnIndex];
        
        switchScreen('playScreen');
        document.getElementById('turnName').innerText = currentPlayer.name;

        // تحديث قائمة الأهداف (كل اللاعبين ما عدا أنا)
        const targetSelect = document.getElementById('targetPlayerSelect');
        targetSelect.innerHTML = players
            .filter(p => p.id !== myId)
            .map(p => `<option value="${p.id}">${p.name}</option>`).join('');

        if(currentPlayer.id === myId) {
            document.getElementById('myActionArea').style.display = 'block';
            document.getElementById('waitingText').style.display = 'none';
        } else {
            document.getElementById('myActionArea').style.display = 'none';
            document.getElementById('waitingText').style.display = 'block';
        }

        if(data.log) {
            const logDiv = document.getElementById('gameHistory');
            logDiv.innerHTML = `<div class="hist-item">${data.log}</div>` + logDiv.innerHTML;
        }
    }

    function sendGuess() {
        const val = parseInt(document.getElementById('guessInput').value);
        const targetId = document.getElementById('targetPlayerSelect').value;
        const targetName = players.find(p => p.id === targetId).name;
        
        if(!val) return;
        document.getElementById('guessInput').value = '';

        const targetSecret = players.find(p => p.id === targetId).secret;
        let hint = "";
        
        if(val === targetSecret) {
            const winData = {type: 'WINNER', winnerName: myName, targetName: targetName, secret: val};
            if(myRole === 'host') { broadcast(winData); showWinner(winData); }
            else conn.send(winData);
            return;
        }

        hint = (val > targetSecret) ? `رقم ${targetName} أصغر من ${val} ⬇️` : `رقم ${targetName} أكبر من ${val} ⬆️`;
        const logMsg = `<span class="hist-name">${myName}</span> خمن رقم ${targetName}: ${val} <br> <small>${hint}</small>`;

        let nextIdx = (turnIndex + 1) % players.length;
        
        const eventData = {type: 'GUESS_EVENT', nextTurn: nextIdx, log: logMsg};
        if(myRole === 'host') { broadcast(eventData); handleGuessEvent(eventData); }
        else conn.send(eventData);
    }

    function showWinner(data) {
        switchScreen('endScreen');
        document.getElementById('winnerTitle').innerText = `🏆 الفائز: ${data.winnerName}`;
        document.getElementById('winDetail').innerText = `لقد استطاع حزر رقم ${data.targetName} بنجاح وهو (${data.secret})`;
    }

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function startAI() {
        alert("وضع الـ AI حالياً يدعم لاعب ضد لاعب فقط، سيتم تحويلك للنسخة السابقة");
        location.reload(); 
    }
</script>
</body>
</html>
